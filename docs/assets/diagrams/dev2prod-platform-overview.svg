<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dev2Prod platform overview</title>
  <desc id="desc">A high-level architecture diagram showing the public client, control plane, reference workload, Redis, Chaos Mesh, managed PostgreSQL, and GitHub Actions deployment path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCFF"/>
      <stop offset="1" stop-color="#F4F7FB"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17714F"/>
      <stop offset="1" stop-color="#326DE6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#132033" flood-opacity="0.08"/>
    </filter>
    <style>
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5D6B84; letter-spacing: 0.08em; text-transform: uppercase; }
      .heading { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1B2840; }
      .sub { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5D6B84; }
      .boxTitle { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1B2840; }
      .boxBody { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5D6B84; }
      .mini { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #326DE6; letter-spacing: 0.06em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="32" fill="url(#bg)"/>

  <text x="64" y="74" class="label">Dev2Prod</text>
  <text x="64" y="118" class="heading">Controlled chaos and scale lab for Kubernetes workloads</text>
  <text x="64" y="150" class="sub">One public product surface, one API-first control plane, one reference workload, and a cluster story built around resilience and scale.</text>

  <rect x="64" y="206" width="1152" height="472" rx="26" fill="#FFFFFF" stroke="#D8E0EB" filter="url(#shadow)"/>
  <text x="96" y="248" class="label">Runtime</text>

  <rect x="96" y="276" width="800" height="360" rx="24" fill="#F8FAFD" stroke="#D8E0EB"/>
  <text x="128" y="320" class="label">DigitalOcean Kubernetes Cluster</text>

  <rect x="128" y="354" width="216" height="214" rx="22" fill="#FFFDF8" stroke="#D8E0EB"/>
  <text x="156" y="394" class="mini">Public entrypoint</text>
  <text x="156" y="430" class="boxTitle">Client</text>
  <text x="156" y="462" class="boxBody">Landing, Workspace, Performance, and</text>
  <text x="156" y="486" class="boxBody">reference workload access through one URL.</text>

  <rect x="372" y="354" width="236" height="214" rx="22" fill="#F7FBFF" stroke="#D8E0EB"/>
  <text x="400" y="394" class="mini">API-first engine</text>
  <text x="400" y="430" class="boxTitle">Control Plane</text>
  <text x="400" y="462" class="boxBody">Streams cluster state, starts drills, launches</text>
  <text x="400" y="486" class="boxBody">scale runs, and turns raw signals into product flows.</text>

  <rect x="636" y="354" width="228" height="214" rx="22" fill="#F8FFFC" stroke="#D8E0EB"/>
  <text x="664" y="394" class="mini">Reference workload</text>
  <text x="664" y="430" class="boxTitle">URL Shortener API</text>
  <text x="664" y="462" class="boxBody">A simple app used to make resilience and</text>
  <text x="664" y="486" class="boxBody">scale behavior visible in a live system.</text>

  <rect x="128" y="588" width="350" height="24" rx="12" fill="#EEF4FF"/>
  <text x="156" y="606" class="boxBody">Chaos Mesh applies controlled faults inside the namespace.</text>

  <rect x="496" y="588" width="368" height="24" rx="12" fill="#EEF8F2"/>
  <text x="524" y="606" class="boxBody">Redis supports the cache-aware Gold scalability lane.</text>

  <rect x="930" y="276" width="254" height="152" rx="22" fill="#FFFDF8" stroke="#D8E0EB"/>
  <text x="958" y="316" class="mini">Managed data</text>
  <text x="958" y="352" class="boxTitle">PostgreSQL</text>
  <text x="958" y="384" class="boxBody">Persistent workload data lives outside the pod</text>
  <text x="958" y="408" class="boxBody">lifecycle and is reseeded for the reference demo.</text>

  <rect x="930" y="456" width="254" height="152" rx="22" fill="#F7FBFF" stroke="#D8E0EB"/>
  <text x="958" y="496" class="mini">Delivery path</text>
  <text x="958" y="532" class="boxTitle">GitHub Actions</text>
  <text x="958" y="564" class="boxBody">Tests gate releases, images are built and pushed,</text>
  <text x="958" y="588" class="boxBody">and the cluster is updated through one pipeline.</text>

  <circle cx="44" cy="406" r="18" fill="#EEF4FF"/>
  <text x="34" y="412" class="mini">UI</text>
  <path d="M64 406H118" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <path d="M344 462H372" stroke="#326DE6" stroke-width="3" stroke-linecap="round"/>
  <path d="M608 462H636" stroke="#326DE6" stroke-width="3" stroke-linecap="round"/>
  <path d="M750 354V322H930" stroke="#326DE6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M490 354V248H1058V456" stroke="#17714F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <rect x="64" y="698" width="1152" height="1" fill="#D8E0EB"/>
  <text x="64" y="730" class="sub">Current truth: one reference workload in one guarded scope. Platform direction: headless control plane, broader workload onboarding, and more guided resilience workflows.</text>
</svg>
