<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workload unavailable</title>
    <style>
      :root {
        color: #16233a;
        background: #f6f3ed;
        font-family:
          "Neue Haas Grotesk Display",
          "Avenir Next",
          "Segoe UI Variable Text",
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        background:
          radial-gradient(circle at top right, rgba(50, 109, 230, 0.08), transparent 24rem),
          radial-gradient(circle at bottom left, rgba(21, 115, 107, 0.08), transparent 24rem),
          #f6f3ed;
      }

      main {
        width: min(44rem, 100%);
        padding: 1.6rem;
        border: 1px solid #d7d2c8;
        background: #fffdf8;
        box-shadow: 0 24px 50px rgba(22, 35, 58, 0.08);
      }

      p {
        margin: 0;
        color: #5f6978;
      }

      h1 {
        margin: 0.4rem 0 0.7rem;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        line-height: 0.95;
        letter-spacing: -0.045em;
      }

      .eyebrow {
        color: #5f6978;
        font-size: 0.74rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-top: 1.3rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.85rem;
        padding: 0 1rem;
        border: 1px solid #d7d2c8;
        background: #fffefb;
        color: inherit;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Workload</p>
      <h1>The shortener is not responding right now.</h1>
      <p>
        The public workload path is up, but the workload service behind it is currently
        unavailable. Return to the main workspace to inspect the cluster and recovery state.
      </p>

      <div class="actions">
        <a href="/">Open workspace</a>
        <a href="/api/cluster/status">View cluster status</a>
      </div>
    </main>
  </body>
</html>
