server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /shortener {
    return 302 /shortener/;
  }

  location /api/ {
    proxy_pass http://control-plane:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
  }

  location /shortener/ {
    proxy_pass http://workload-api:5000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /shortener;
    proxy_buffering off;
    proxy_cache off;
    proxy_intercept_errors on;
    error_page 502 503 504 = /workload-down.html;
  }

  location / {
    try_files $uri /index.html;
  }
}
