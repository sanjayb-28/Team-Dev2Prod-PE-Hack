server {
  listen 80;
  server_name _;
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate /etc/nginx/tls/tls.crt;
  ssl_certificate_key /etc/nginx/tls/tls.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:TLSCache:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;

  location = /shortener {
    return 302 /shortener/;
  }

  location /api/ {
    proxy_pass http://control-plane:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
  }

  location /shortener/ {
    proxy_pass http://workload-api:5000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /shortener;
    proxy_buffering off;
    proxy_cache off;
    proxy_intercept_errors on;
    error_page 502 503 504 = /workload-down.html;
  }

  location / {
    try_files $uri /index.html;
  }
}
