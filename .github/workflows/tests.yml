name: Tests and Gate

on:
  push:
  pull_request:

jobs:
  workload-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests and coverage gate
        run: uv run pytest

  release-gate:
    runs-on: ubuntu-latest
    needs:
      - workload-tests

    steps:
      - name: Confirm release gate
        run: echo "All required checks passed. Release gate is open."
