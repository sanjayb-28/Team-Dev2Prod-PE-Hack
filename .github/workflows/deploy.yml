name: Deploy to DigitalOcean

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Tests and Gate
    types:
      - completed

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DO_NAMESPACE: dev2prod
      DO_REGISTRY: dev2prod
      DOKS_CLUSTER_NAME: dev2prod
      DATABASE_CLUSTER_NAME: dev2prod
      BACKEND_REPOSITORY: dev2prod-backend
      CLIENT_REPOSITORY: dev2prod-client

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Wait for cluster readiness
        run: |
          for attempt in $(seq 1 40); do
            STATUS="$(doctl kubernetes cluster get "$DOKS_CLUSTER_NAME" --format Status --no-header | tr -d '[:space:]')"
            if [ "$STATUS" = "running" ]; then
              exit 0
            fi
            echo "Cluster status: ${STATUS:-unknown}. Waiting for running."
            sleep 30
          done
          echo "Cluster did not become ready in time."
          exit 1

      - name: Resolve database cluster id
        run: |
          DATABASE_ID="$(
            doctl databases list --output json | python3 -c "import json, os, sys; target=os.environ['DATABASE_CLUSTER_NAME']; print(next((cluster['id'] for cluster in json.load(sys.stdin) if cluster.get('name') == target and cluster.get('engine') == 'pg'), ''))"
          )"
          if [ -z "$DATABASE_ID" ]; then
            echo "Could not find the PostgreSQL database cluster."
            exit 1
          fi
          echo "DATABASE_ID=$DATABASE_ID" >> "$GITHUB_ENV"

      - name: Wait for database readiness
        run: |
          for attempt in $(seq 1 40); do
            STATUS="$(doctl databases get "$DATABASE_ID" --format Status --no-header | tr -d '[:space:]')"
            if [ "$STATUS" = "online" ]; then
              exit 0
            fi
            echo "Database status: ${STATUS:-unknown}. Waiting for online."
            sleep 30
          done
          echo "Database did not become ready in time."
          exit 1

      - name: Prepare image names
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_SHA="${{ github.sha }}"
          else
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          SHORT_SHA="$(printf '%s' "$DEPLOY_SHA" | cut -c1-7)"
          echo "DEPLOY_SHA=$DEPLOY_SHA" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=registry.digitalocean.com/${DO_REGISTRY}/${BACKEND_REPOSITORY}:$SHORT_SHA" >> "$GITHUB_ENV"
          echo "CLIENT_IMAGE=registry.digitalocean.com/${DO_REGISTRY}/${CLIENT_REPOSITORY}:$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Log in to DigitalOcean Container Registry
        run: |
          mkdir -p "$HOME/.docker"
          doctl registry docker-config \
            --read-write \
            --expiry-seconds 1200 > "$HOME/.docker/config.json"

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE" .

      - name: Build client image
        run: docker build -f client/Dockerfile -t "$CLIENT_IMAGE" .

      - name: Push backend image
        run: docker push "$BACKEND_IMAGE"

      - name: Push client image
        run: docker push "$CLIENT_IMAGE"

      - name: Save cluster credentials
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 "$DOKS_CLUSTER_NAME"

      - name: Apply namespace
        run: kubectl apply -f infra/digitalocean/k8s/namespace.yaml

      - name: Apply registry pull secret
        run: doctl registry kubernetes-manifest --namespace="$DO_NAMESPACE" --name=do-registry | kubectl apply -f -

      - name: Apply workload secret
        run: |
          kubectl -n "$DO_NAMESPACE" create secret generic workload-env \
            --from-literal=DATABASE_URL='${{ secrets.WORKLOAD_DATABASE_URL }}' \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Apply client tls secret
        run: |
          cat > "$RUNNER_TEMP/client-tls.crt" <<'EOF'
          ${{ secrets.CLIENT_TLS_CERT }}
          EOF
          cat > "$RUNNER_TEMP/client-tls.key" <<'EOF'
          ${{ secrets.CLIENT_TLS_KEY }}
          EOF
          kubectl -n "$DO_NAMESPACE" create secret tls client-tls \
            --cert="$RUNNER_TEMP/client-tls.crt" \
            --key="$RUNNER_TEMP/client-tls.key" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Render manifests
        run: |
          mkdir -p "$RUNNER_TEMP/digitalocean-k8s"
          for file in infra/digitalocean/k8s/*.yaml; do
            sed \
              -e "s|__BACKEND_IMAGE__|$BACKEND_IMAGE|g" \
              -e "s|__CLIENT_IMAGE__|$CLIENT_IMAGE|g" \
              "$file" > "$RUNNER_TEMP/digitalocean-k8s/$(basename "$file")"
          done

      - name: Apply platform manifests
        run: kubectl apply -f "$RUNNER_TEMP/digitalocean-k8s"

      - name: Verify rollout
        run: |
          kubectl -n "$DO_NAMESPACE" rollout status deployment/workload-api --timeout=180s
          kubectl -n "$DO_NAMESPACE" rollout status deployment/control-plane --timeout=180s
          kubectl -n "$DO_NAMESPACE" rollout status deployment/client --timeout=180s

      - name: Show public service
        run: |
          kubectl -n "$DO_NAMESPACE" get deployment,service,pod -o wide
          kubectl -n "$DO_NAMESPACE" get service client -o wide
