apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: dev2prod
  labels:
    app.kubernetes.io/name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: client
    spec:
      imagePullSecrets:
        - name: do-registry
      containers:
        - name: client
          image: __CLIENT_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: dev2prod
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: client
  ports:
    - port: 80
      targetPort: http
      name: http
