apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: dev2prod
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-tls-ports: "443"
    service.beta.kubernetes.io/do-loadbalancer-tls-passthrough: "true"
    service.beta.kubernetes.io/do-loadbalancer-type: "REGIONAL_NETWORK"
  labels:
    app.kubernetes.io/name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: client
    spec:
      imagePullSecrets:
        - name: do-registry
      volumes:
        - name: client-tls
          secret:
            secretName: client-tls
            optional: true
      containers:
        - name: client
          image: __CLIENT_IMAGE__
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: client-tls
              mountPath: /etc/nginx/tls
              readOnly: true
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: dev2prod
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: client
  ports:
    - port: 80
      targetPort: http
      name: http
    - port: 443
      targetPort: https
      name: https
