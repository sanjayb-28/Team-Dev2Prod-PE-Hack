apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: dev2prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane
  namespace: dev2prod
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["chaos-mesh.org"]
    resources: ["podchaos", "networkchaos", "stresschaos"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane
  namespace: dev2prod
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: dev2prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane
