services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dev2prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev2prod"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "16379:6379"

  workload-api:
    build:
      context: ../..
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dev2prod
      DATABASE_POOL_MAX_CONNECTIONS: 1
      DATABASE_POOL_STALE_TIMEOUT: 300
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "15000:5000"

  workload-api-a:
    profiles: ["scale"]
    build:
      context: ../..
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dev2prod
      DATABASE_POOL_MAX_CONNECTIONS: 1
      DATABASE_POOL_STALE_TIMEOUT: 300
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  workload-api-b:
    profiles: ["scale"]
    build:
      context: ../..
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dev2prod
      DATABASE_POOL_MAX_CONNECTIONS: 1
      DATABASE_POOL_STALE_TIMEOUT: 300
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scale-gateway:
    profiles: ["scale"]
    image: nginx:1.29-alpine
    depends_on:
      workload-api-a:
        condition: service_started
      workload-api-b:
        condition: service_started
    ports:
      - "16000:8080"
    volumes:
      - ./nginx.scale.conf:/etc/nginx/nginx.conf:ro

  k6:
    profiles: ["scale"]
    image: grafana/k6:0.51.0
    working_dir: /scripts
    entrypoint: ["k6"]
    volumes:
      - ./load-tests:/scripts:ro

  control-plane:
    build:
      context: ../..
    command:
      [
        "uv",
        "run",
        "gunicorn",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "2",
        "--threads",
        "4",
        "--timeout",
        "60",
        "run_control_plane:app",
      ]
    environment:
      APP_HOST: 0.0.0.0
      CONTROL_PLANE_PORT: 8000
      CLUSTER_NAME: dev2prod-local
      CLUSTER_NAMESPACE: dev2prod
      CLUSTER_PROVIDER: docker
      WORKLOAD_API_URL: http://workload-api:5000
      WORKLOAD_DEPLOYMENT_NAME: workload-api
      WORKLOAD_SERVICE_NAME: workload-api
      CONTROL_PLANE_DEPLOYMENT_NAME: control-plane
      CONTROL_PLANE_ALLOWED_ORIGIN: http://127.0.0.1:5173
      CHAOS_MESH_ENABLED: "false"
    depends_on:
      workload-api:
        condition: service_started
    ports:
      - "18000:8000"

  client:
    build:
      context: ../..
      dockerfile: client/Dockerfile
    depends_on:
      control-plane:
        condition: service_started
    ports:
      - "14000:80"

volumes:
  postgres_data:
