services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dev2prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev2prod"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  workload-api:
    build:
      context: ../..
    command: ["uv", "run", "python", "run.py"]
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dev2prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "15000:5000"

  control-plane:
    build:
      context: ../..
    command: ["uv", "run", "python", "run_control_plane.py"]
    environment:
      APP_HOST: 0.0.0.0
      CONTROL_PLANE_PORT: 8000
      CLUSTER_NAME: dev2prod-local
      CLUSTER_NAMESPACE: dev2prod
      CLUSTER_PROVIDER: docker
      WORKLOAD_API_URL: http://workload-api:5000
      WORKLOAD_DEPLOYMENT_NAME: workload-api
      WORKLOAD_SERVICE_NAME: workload-api
      CONTROL_PLANE_DEPLOYMENT_NAME: control-plane
      CONTROL_PLANE_ALLOWED_ORIGIN: http://127.0.0.1:5173
      CHAOS_MESH_ENABLED: "false"
    depends_on:
      workload-api:
        condition: service_started
    ports:
      - "18000:8000"

  client:
    build:
      context: ../..
      dockerfile: client/Dockerfile
    depends_on:
      control-plane:
        condition: service_started
    ports:
      - "14000:80"

volumes:
  postgres_data:
